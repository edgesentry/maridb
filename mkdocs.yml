site_name: indago
site_description: Multi-domain OSINT data layer — ingestion, transformation, and distribution of open-source intelligence.
site_url: https://edgesentry.github.io/indago/
repo_url: https://github.com/edgesentry/indago
repo_name: edgesentry/indago
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - navigation.tracking
    - search.highlight
    - content.action.edit
    - content.code.copy

plugins:
  - search

markdown_extensions:
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - tables
  - admonition

nav:
  - Home: index.md
  - Design:
    - Analytics Overview: ref-analytics-overview.md
    - Feature Engineering: ref-feature-engineering.md
    - Scoring Model: ref-scoring-model.md
    - Causal Analysis: ref-causal-analysis.md
    - Field Investigation: ref-field-investigation.md
    - Triage Governance: ref-triage-governance.md
  - Operations:
    - Pipeline Overview: ref-pipeline.md
    - Pipeline Catalog: ref-pipeline-catalog.md
    - Regional Playbooks: ref-regional-playbooks.md
    - R2 Buckets: ref-r2-buckets.md
    - R2 Data Layout: ref-r2-data-layout.md
  - Validation:
    - Backtesting: ref-backtesting.md
    - Evaluation Metrics: ref-evaluation-metrics.md
    - Precision Plan: ref-precision-plan.md
    - Pre-Label Governance: ref-prelabel-governance.md
  - Reference:
    - OSINT Workflow: ref-osint-workflow.md
    - Study Guide: ref-study-guide.md
  - Related:
    - arktrace: https://github.com/edgesentry/arktrace
    - documaris: https://github.com/edgesentry/documaris
    - clarus: https://github.com/edgesentry/clarus
    - edgesentry-rs: https://github.com/edgesentry/edgesentry-rs
