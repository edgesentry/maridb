site_name: indago
site_description: Multi-domain OSINT data layer — ingestion, transformation, and distribution of open-source intelligence.
site_url: https://edgesentry.github.io/indago/
repo_url: https://github.com/edgesentry/indago
repo_name: edgesentry/indago
edit_uri: edit/main/docs/

docs_dir: docs

theme:
  name: material
  palette:
    - scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.sections
    - navigation.top
    - search.highlight
    - content.action.edit

nav:
  - Home: index.md
  - Design:
    - Analytics Overview: analytics-overview.md
    - Feature Engineering: feature-engineering.md
    - Scoring Model: scoring-model.md
    - Triage Governance: triage-governance.md
    - Field Investigation: field-investigation.md
    - Causal Analysis: causal-analysis.md
  - Operations:
    - Pipeline (indago): pipeline.md
    - Pipeline Catalog: pipeline-catalog.md
    - Pipeline Operations: pipeline-operations.md
    - Regional Playbooks: regional-playbooks.md
    - R2 Buckets: r2-buckets.md
    - R2 Data Layout: r2-data-layout.md
  - Validation:
    - Backtesting Validation: backtesting-validation.md
    - Evaluation Metrics: evaluation-metrics.md
    - Precision Improvement Plan: precision-improvement-plan.md
    - Pre-Label Governance: prelabel-governance.md
    - Backtracking Runbook: backtracking-runbook.md
  - Reference:
    - Study Guide: study-guide.md
    - Shadow Fleet OSINT Playbook: shadow-fleet-osint-playbook.md
    - OSINT Workflow Design (LLM vs GHA): osint-workflow-design.md
