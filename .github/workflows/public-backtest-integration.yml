name: Public Backtest Integration

on:
  push:
    branches: ["main"]

permissions:
  contents: read

concurrency:
  group: public-backtest-integration-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backtest:
    name: Public backtest batch
    runs-on: ubuntu-latest
    env:
      MARIDB_DATA_DIR: data/processed

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run public-data backtest integration batch
        run: |
          uv run python scripts/run_public_backtest_batch.py \
            --regions singapore,japan,europe,blacksea \
            --gdelt-days 14 \
            --stream-duration 0 \
            --seed-dummy \
            --max-known-cases 200 \
            --min-known-cases 5 \
            --min-watchlist-size 5 \
            --strict-known-cases

      - name: Upload public-backtest artifacts
        if: always()
        uses: actions/upload-artifact@65462800fd760344b1a7b4382951275a0abb4808 # v4
        with:
          name: public-backtest-integration
          path: |
            data/processed/public_eval_metadata.json
            data/processed/evaluation_manifest_public_integration.json
            data/processed/backtest_report_public_integration.json
            data/processed/backtest_public_integration_summary.json
            data/processed/eval_labels_public_*_integration.csv
          if-no-files-found: warn
