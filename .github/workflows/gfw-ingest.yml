name: GFW EO Ingest

# Fetches GFW vessel-presence detections weekly and pushes them to private R2.
# The daily data-publish pipeline pulls these parquets instead of calling the
# GFW API directly, avoiding per-run 429 rate limits and 180s API timeouts.
#
# Triggers:
#   - Weekly Monday 00:00 UTC (before data-publish at 01:00)
#   - Manual dispatch
#
# Token assignment — GFW allows ONE concurrent report per token.
# Regions run sequentially (max-parallel: 1) so the single token
# is never contended across jobs.

on:
  schedule:
    - cron: '0 0 * * 1'  # weekly Monday 00:00 UTC
  workflow_dispatch:

permissions: {}

concurrency:
  group: gfw-ingest
  cancel-in-progress: true

jobs:
  ingest:
    name: Fetch ${{ matrix.region }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    continue-on-error: true  # 429/503 on one region must not block the push job
    permissions:
      contents: read
    strategy:
      max-parallel: 1  # one region at a time — avoids 429 on shared token
      fail-fast: false
      matrix:
        region:
          - singapore
          - japan
          - europe
          - blacksea
          - middleeast
    env:
      MARIDB_DATA_DIR: data/processed

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Fetch GFW EO detections
        env:
          GFW_API_TOKEN: ${{ secrets.GFW_API_TOKEN }}
        run: |
          uv run python scripts/gfw_ingest.py \
            --regions ${{ matrix.region }} \
            --days 30

      - name: Upload parquet artifact
        uses: actions/upload-artifact@v4
        with:
          name: gfw-eo-${{ matrix.region }}
          path: data/processed/${{ matrix.region }}_eo_detections.parquet
          if-no-files-found: warn

  push:
    name: Push GFW EO parquets to R2
    runs-on: ubuntu-latest
    needs: ingest
    if: always()
    permissions:
      contents: read
    env:
      MARIDB_DATA_DIR: data/processed

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b  # v8.1.0
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Download all parquet artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: gfw-eo-*
          path: data/processed
          merge-multiple: true

      - name: Push GFW EO parquets to private R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: auto
        run: uv run python scripts/sync_r2.py push-gfw-eo
